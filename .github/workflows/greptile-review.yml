name: Greptile Code Review

on:
  pull_request:
    branches: [ main ]  # 只监听 main 分支的 PR
  pull_request_review_comment:
    types: [created]    # 支持评论触发重新审查

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # 允许 Greptile 写审查评论到 PR
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整代码历史，方便 Greptile 分析上下文

      - name: Run Greptile AI Review
        uses: greptile/greptile-action@v1
        with:
          api-key: ${{ secrets.GREPTILE_API_KEY }}  # 后续要配置的密钥
          repo-url: ${{ github.repositoryUrl }}
          pr-number: ${{ github.event.pull_request.number }}
          # 重点：Greptile 支持自定义审查规则，这里开启深度上下文分析
          config: |
            {
              "analysis": {
                "depth": "deep",  # 深度分析（跨文件/跨函数）
                "checks": ["logic", "security", "performance", "style"]
              }
            }
